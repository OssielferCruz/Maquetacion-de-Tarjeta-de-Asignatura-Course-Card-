<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Asignatura - Programación Web</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <main class="container min-vh-100 d-flex align-items-center py-4">
        <div class="row w-100 justify-content-center">
            <article class="course-card col-12 col-md-4 p-0">
            <!-- Encabezado visual (portada) -->
            <div class="course-card__header">
                <img src="https://via.placeholder.com/400x200/2c3e50/2c3e50" alt="Portada Programación Web" class="course-card__image">
            </div>
            
            <!-- Contenido principal -->
            <div class="course-card__body">
                <h1 class="course-card__title">Programación Web</h1>
                <p class="course-card__teacher">Ing. Aaron Cisneros</p>

                <div class="course-card__badges" aria-label="Información de sección y aula">
                    <span class="course-badge">ING-402</span>
                    <span class="course-badge">Gpo1</span>
                    <span class="course-badge">Aula E-201</span>
                </div>

                <a href="#" class="course-card__action">Ingresar al Aula Virtual</a>
            </div>
            </article>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
